<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Rial to DH Converter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Inter:wght@400;600;800&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 50% -20%, #1a1025, #000000);
      color: white;
      touch-action: manipulation;
    }
    
    [dir="rtl"] {
      font-family: 'Cairo', sans-serif;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    .neon-text {
      text-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
    }
    
    .neon-border:focus {
      border-color: #00f3ff;
      box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
      outline: none;
    }

    .numpad-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.1s ease;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }
    .numpad-btn:active {
      background: rgba(0, 243, 255, 0.2);
      transform: scale(0.92);
      border-color: rgba(0, 243, 255, 0.4);
    }

    /* Custom scrollbar for history */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

    /* Hide keyboard on touch screens but keep input readable */
    input[inputmode="none"] {
      caret-color: #00f3ff;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.2s ease-out forwards;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-3 sm:p-6 select-none overflow-x-hidden pb-safe">

  <!-- Glowing background orbs -->
  <div class="fixed top-1/4 left-1/4 w-64 h-64 bg-cyan-500/10 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="fixed bottom-1/4 right-1/4 w-64 h-64 bg-fuchsia-500/10 rounded-full blur-[100px] pointer-events-none"></div>

  <div class="glass-panel rounded-3xl w-full max-w-sm p-4 sm:p-6 relative z-10 flex flex-col gap-3 sm:gap-5 my-auto max-h-[94vh] overflow-y-auto">
    
    <!-- Header: Title & Language Toggle -->
    <div class="flex justify-between items-center">
      <h1 id="titleText" class="text-base sm:text-lg font-bold text-gray-200 tracking-wide">Rial ⇄ DH</h1>
      <button onclick="toggleLanguage()" class="text-[11px] sm:text-xs font-semibold bg-white/10 px-3 py-1.5 rounded-full hover:bg-white/20 active:scale-95 transition-all">
        <span id="langIndicator">FR ➔ AR</span>
      </button>
    </div>

    <!-- Input Section -->
    <div class="relative">
      <input type="text" id="mainInput" inputmode="none" oninput="handleManualInput()" 
             class="w-full bg-black/30 border border-white/10 rounded-2xl text-center text-3xl py-3 sm:py-4 font-bold text-white neon-border transition-all placeholder-gray-600 focus:bg-black/50" 
             placeholder="0">
      <p id="exampleText" class="text-center text-gray-400 text-[10px] sm:text-xs mt-1.5 sm:mt-2 font-medium">Ex: 20 ➔ 1000 DH</p>
    </div>

    <!-- Swap Button -->
    <div class="flex justify-center -my-3.5 relative z-20">
      <button onclick="swapConversion()" class="bg-gradient-to-r from-cyan-500 to-blue-500 p-2.5 sm:p-3 rounded-full shadow-[0_0_15px_rgba(0,243,255,0.4)] hover:scale-105 active:scale-90 transition-transform">
        <svg class="w-4.5 h-4.5 sm:w-5 sm:h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
        </svg>
      </button>
    </div>

    <!-- Result Section -->
    <div class="bg-black/20 rounded-2xl p-3 sm:p-4 text-center border border-white/5 relative group min-h-[70px] flex items-center justify-center">
      <h2 id="resultText" class="text-3xl sm:text-4xl font-extrabold text-cyan-400 neon-text break-all px-6 transition-all duration-150">0 DH</h2>
      <button onclick="copyResult()" id="copyBtn" class="absolute top-2 right-2 text-[10px] sm:text-xs bg-white/10 px-2 py-1 rounded-md opacity-90 sm:opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-1 hover:bg-white/20 active:scale-95">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
        <span id="copyText">Copy</span>
      </button>
    </div>

    <!-- Numpad -->
    <div class="grid grid-cols-3 gap-2 sm:gap-3">
      <button onclick="typeChar('1')" class="numpad-btn py-2.5 sm:py-3.5 rounded-xl text-lg sm:text-xl font-semibold">1</button>
      <button onclick="typeChar('2')" class="numpad-btn py-2.5 sm:py-3.5 rounded-xl text-lg sm:text-xl font-semibold">2</button>
      <button onclick="typeChar('3')" class="numpad-btn py-2.5 sm:py-3.5 rounded-xl text-lg sm:text-xl font-semibold">3</button>
      <button onclick="typeChar('4')" class="numpad-btn py-2.5 sm:py-3.5 rounded-xl text-lg sm:text-xl font-semibold">4</button>
      <button onclick="typeChar('5')" class="numpad-btn py-2.5 sm:py-3.5 rounded-xl text-lg sm:text-xl font-semibold">5</button>
      <button onclick="typeChar('6')" class="numpad-btn py-2.5 sm:py-3.5 rounded-xl text-lg sm:text-xl font-semibold">6</button>
      <button onclick="typeChar('7')" class="numpad-btn py-2.5 sm:py-3.5 rounded-xl text-lg sm:text-xl font-semibold">7</button>
      <button onclick="typeChar('8')" class="numpad-btn py-2.5 sm:py-3.5 rounded-xl text-lg sm:text-xl font-semibold">8</button>
      <button onclick="typeChar('9')" class="numpad-btn py-2.5 sm:py-3.5 rounded-xl text-lg sm:text-xl font-semibold">9</button>
      <button onclick="typeChar('C')" class="numpad-btn py-2.5 sm:py-3.5 rounded-xl text-lg sm:text-xl font-semibold text-red-400">C</button>
      <button onclick="typeChar('0')" class="numpad-btn py-2.5 sm:py-3.5 rounded-xl text-lg sm:text-xl font-semibold">0</button>
      <button onclick="typeChar('DEL')" class="numpad-btn py-2.5 sm:py-3.5 rounded-xl text-lg sm:text-xl font-semibold flex justify-center items-center">
        <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z"></path></svg>
      </button>
    </div>

    <!-- Save & History Section -->
    <div class="space-y-2 mt-1">
      <button onclick="saveToHistory()" class="w-full bg-white/10 hover:bg-white/20 text-white font-medium py-2 sm:py-2.5 rounded-xl border border-white/5 transition-all text-sm active:scale-98">
        <span id="saveBtnText">Save to History</span>
      </button>
      
      <div id="historyHeader" class="hidden flex justify-between items-center px-1 text-[10px] sm:text-xs text-gray-400 font-bold uppercase tracking-wider">
        <span id="historyTitleText">History</span>
        <button onclick="clearHistory()" id="clearBtnText" class="text-red-400 hover:text-red-300 transition-colors">Clear</button>
      </div>

      <div id="historyContainer" class="hidden max-h-20 sm:max-h-24 overflow-y-auto pr-1 space-y-1">
        <!-- History items will appear here -->
      </div>
    </div>

  </div>

  <script>
    const translations = {
      fr: {
        title: "Convertisseur Ryal ⇄ DH",
        placeholder_r2d: "Entrez Alf Ryal",
        placeholder_d2r: "Entrez DH",
        example_r2d: "Ex: 20 ➔ 1000 DH",
        example_d2r: "Ex: 1000 ➔ 20 Alf Ryal",
        copy: "Copier",
        copied: "Copié!",
        save: "Sauvegarder",
        langInd: "FR ➔ AR",
        unitRial: "Alf Ryal",
        unitDH: "DH",
        historyTitle: "Historique",
        clearBtn: "Effacer"
      },
      ar: {
        title: "محول الريال ⇄ الدرهم",
        placeholder_r2d: "أدخل ألف ريال",
        placeholder_d2r: "أدخل الدرهم",
        example_r2d: "مثال: 20 ➔ 1000 درهم",
        example_d2r: "مثال: 1000 ➔ 20 ألف ريال",
        copy: "نسخ",
        copied: "تم النسخ!",
        save: "حفظ في السجل",
        langInd: "AR ➔ FR",
        unitRial: "ألف ريال",
        unitDH: "درهم",
        historyTitle: "السجل",
        clearBtn: "مسح"
      }
    };

    let isRialToDh = true;
    let currentLang = 'fr';
    let inputValue = '';
    let sessionHistory = [];

    const inputEl = document.getElementById('mainInput');
    const resultEl = document.getElementById('resultText');
    const exampleEl = document.getElementById('exampleText');
    const copyTextEl = document.getElementById('copyText');
    const historyContainer = document.getElementById('historyContainer');
    const historyHeader = document.getElementById('historyHeader');

    function updateUI() {
      const t = translations[currentLang];
      document.body.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
      
      document.getElementById('titleText').innerText = t.title;
      inputEl.placeholder = isRialToDh ? t.placeholder_r2d : t.placeholder_d2r;
      exampleEl.innerText = isRialToDh ? t.example_r2d : t.example_d2r;
      document.getElementById('langIndicator').innerText = t.langInd;
      copyTextEl.innerText = t.copy;
      document.getElementById('saveBtnText').innerText = t.save;
      document.getElementById('historyTitleText').innerText = t.historyTitle;
      document.getElementById('clearBtnText').innerText = t.clearBtn;
      
      convert();
    }

    function toggleLanguage() {
      triggerHaptic();
      currentLang = currentLang === 'fr' ? 'ar' : 'fr';
      updateUI();
    }

    function swapConversion() {
      triggerHaptic();
      isRialToDh = !isRialToDh;
      if(inputValue) {
        let num = parseFloat(inputValue);
        if(!isNaN(num)) {
          inputValue = isRialToDh ? (num / 50).toString() : (num * 50).toString();
          inputEl.value = inputValue;
        }
      }
      updateUI();
    }

    function typeChar(char) {
      triggerHaptic();
      if (char === 'C') {
        inputValue = '';
      } else if (char === 'DEL') {
        inputValue = inputValue.slice(0, -1);
      } else {
        // Prevent multiple decimals
        if (char === '.' && inputValue.includes('.')) return;
        inputValue += char;
      }
      inputEl.value = inputValue;
      convert();
    }

    function handleManualInput() {
      inputValue = inputEl.value.replace(/[^0-9.]/g, '');
      inputEl.value = inputValue;
      convert();
    }

    function triggerHaptic() {
      if (window.navigator && window.navigator.vibrate) {
        window.navigator.vibrate(10);
      }
    }

    function adjustFontSize() {
      // Adjust Input Font Size
      const inputLength = inputValue.length;
      if (inputLength > 12) {
        inputEl.style.fontSize = '1.25rem';
      } else if (inputLength > 8) {
        inputEl.style.fontSize = '1.75rem';
      } else {
        inputEl.style.fontSize = '1.875rem'; // ~30px
      }

      // Adjust Result Font Size
      const resultLength = resultEl.innerText.length;
      if (resultLength > 16) {
        resultEl.style.fontSize = '1.25rem';
      } else if (resultLength > 10) {
        resultEl.style.fontSize = '1.75rem';
      } else {
        resultEl.style.fontSize = '2.25rem'; // ~36px
      }
    }

    function convert() {
      const num = parseFloat(inputValue);
      const t = translations[currentLang];
      
      if (isNaN(num) || inputValue === '') {
        resultEl.innerText = `0 ${isRialToDh ? t.unitDH : t.unitRial}`;
        adjustFontSize();
        return;
      }

      let res = isRialToDh ? num * 50 : num / 50;
      res = res % 1 === 0 ? res : parseFloat(res.toFixed(2)); // Clean decimals
      
      resultEl.innerText = `${res} ${isRialToDh ? t.unitDH : t.unitRial}`;
      adjustFontSize();
    }

    function copyResult() {
      triggerHaptic();
      const textToCopy = resultEl.innerText;
      if(textToCopy.startsWith('0')) return;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(textToCopy).then(() => {
          showCopied();
        });
      } else {
        const textarea = document.createElement('textarea');
        textarea.value = textToCopy;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showCopied();
      }
    }

    function showCopied() {
      copyTextEl.innerText = translations[currentLang].copied;
      setTimeout(() => {
        copyTextEl.innerText = translations[currentLang].copy;
      }, 2000);
    }

    function saveToHistory() {
      triggerHaptic();
      if (!inputValue) return;
      const t = translations[currentLang];
      const fromUnit = isRialToDh ? t.unitRial : t.unitDH;
      const toUnit = isRialToDh ? t.unitDH : t.unitRial;
      const resultText = resultEl.innerText;
      
      const historyStr = `${inputValue} ${fromUnit} = ${resultText}`;
      sessionHistory.unshift(historyStr);
      
      renderHistory();
    }

    function renderHistory() {
      if (sessionHistory.length === 0) {
        historyContainer.classList.add('hidden');
        historyHeader.classList.add('hidden');
        return;
      }
      historyContainer.classList.remove('hidden');
      historyHeader.classList.remove('hidden');
      
      historyContainer.innerHTML = sessionHistory.map((item, index) => `
        <div class="bg-black/30 rounded-lg p-2 text-sm text-gray-300 border border-white/5 flex justify-between items-center animate-fade-in">
          <span class="flex-1 text-center font-medium">${item}</span>
          <button onclick="deleteHistoryItem(${index})" class="text-gray-500 hover:text-red-400 p-1 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
          </button>
        </div>
      `).join('');
    }

    function deleteHistoryItem(index) {
      triggerHaptic();
      sessionHistory.splice(index, 1);
      renderHistory();
    }

    function clearHistory() {
      triggerHaptic();
      sessionHistory = [];
      renderHistory();
    }

    // Initialize UI
    updateUI();
  </script>
</body>
</html>
