<!DOCTYPE html>
<html lang="fr" dir="ltr" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Rial to DH Converter</title>
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#232b3c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rial ⇄ DH">
  <link rel="apple-touch-icon" href="icon-512.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            cairo: ['Cairo', 'sans-serif']
          }
        }
      }
    }
  </script>

  <style>
    /* Premium Neumorphic Styling & Dynamic Themes */
    :root {
      --bg-color: #f3f4f6;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --shadow-light: #ffffff;
      --shadow-dark: #d1d5db;
      --panel-bg: #e5e7eb;
      --btn-bg: #f9fafb;
      --btn-active-bg: #e5e7eb;
      --accent-color: #f2a93b;
      --accent-shadow-dark: #c68523;
      --accent-shadow-light: #ffcd73;
    }

    .dark {
      --bg-color: #232b3c;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --shadow-light: #2d374d;
      --shadow-dark: #191f2b;
      --panel-bg: #1e2533;
      --btn-bg: #283246;
      --btn-active-bg: #1c2331;
      --accent-color: #e89725;
      --accent-shadow-dark: #aa6b13;
      --accent-shadow-light: #ffc36e;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    [dir="rtl"] {
      font-family: 'Cairo', sans-serif;
    }

    /* Soft Claymorphic / Neumorphic shadows */
    .neumorphic-panel {
      background: var(--bg-color);
      box-shadow: 12px 12px 28px var(--shadow-dark), -12px -12px 28px var(--shadow-light);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .neumorphic-screen {
      background: var(--panel-bg);
      box-shadow: inset 4px 4px 10px var(--shadow-dark), inset -4px -4px 10px var(--shadow-light);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .neumorphic-btn {
      background: var(--btn-bg);
      box-shadow: 5px 5px 12px var(--shadow-dark), -5px -5px 12px var(--shadow-light);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .neumorphic-btn:active {
      background: var(--btn-active-bg);
      box-shadow: inset 3px 3px 8px var(--shadow-dark), inset -3px -3px 8px var(--shadow-light);
      transform: scale(0.96);
    }

    /* Elegant Yellow/Orange tactile action buttons */
    .neumorphic-btn-accent {
      background: var(--accent-color);
      box-shadow: 5px 5px 12px var(--shadow-dark), -5px -5px 12px var(--shadow-light);
      color: white;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .neumorphic-btn-accent:active {
      box-shadow: inset 3px 3px 8px var(--accent-shadow-dark), inset -3px -3px 8px var(--accent-shadow-light);
      transform: scale(0.96);
    }

    /* Double slider moon/sun switcher styling */
    .toggle-slider {
      box-shadow: inset 3px 3px 8px var(--shadow-dark), inset -3px -3px 8px var(--shadow-light);
    }

    .toggle-knob {
      box-shadow: 2px 2px 6px var(--shadow-dark), -2px -2px 6px var(--shadow-light);
    }

    /* Animation effects */
    @keyframes blink {
      50% { opacity: 0; }
    }
    .cursor-blink {
      animation: blink 1s step-end infinite;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-down {
      animation: slideDown 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* Custom elegant scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--shadow-dark);
      border-radius: 9999px;
    }

    /* Mobile Responsive Fullscreen adjustments (removes margins/shadows on phone screens) */
    @media (max-width: 639px) {
      body {
        padding: 0 !important;
        overflow-y: auto !important;
        background-color: var(--bg-color) !important;
      }
      .neumorphic-panel {
        box-shadow: none !important;
        border-radius: 0 !important;
        width: 100vw !important;
        min-height: 100vh !important;
        min-height: -webkit-fill-available !important;
        padding: 1.25rem !important; /* 20px padding on mobile */
        display: flex !important;
        flex-direction: column !important;
        justify-content: space-between !important;
        gap: 1rem !important;
      }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 overflow-x-hidden font-sans">

  <!-- Core App Wrapper -->
  <div class="neumorphic-panel rounded-[40px] w-full max-w-[380px] p-6 flex flex-col gap-6 relative">
    
    <!-- Top Bar: Theme Switcher & Language Switcher -->
    <div class="flex justify-between items-center px-1">
      
      <!-- Theme Switch (Moon / Sun Sliding Switcher) -->
      <div onclick="toggleTheme()" class="toggle-slider relative w-16 h-8 bg-gray-200 dark:bg-slate-800 rounded-full flex items-center justify-between px-2 cursor-pointer transition-colors duration-300">
        <!-- Moon Icon -->
        <svg class="w-4 h-4 text-blue-400 dark:text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
        <!-- Sun Icon -->
        <svg class="w-4 h-4 text-amber-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.46 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"></path></svg>
        
        <!-- Sliding Physical Knob -->
        <div id="themeKnob" class="toggle-knob absolute w-6 h-6 bg-white rounded-full transition-transform duration-300 transform translate-x-0 dark:translate-x-8"></div>
      </div>

      <!-- Title / Brand Label -->
      <h1 class="text-sm font-semibold tracking-wider text-[var(--text-muted)] uppercase">Rial ⇄ DH</h1>

      <!-- Language Toggle Button -->
      <button onclick="toggleLanguage()" class="neumorphic-btn px-4 py-1.5 rounded-full text-xs font-bold transition-all hover:scale-105 active:scale-95">
        <span id="langIndicator">FR ➔ AR</span>
      </button>
    </div>

    <!-- Display Screen -->
    <div class="neumorphic-screen rounded-[28px] p-5 flex flex-col justify-between min-h-[140px] relative overflow-hidden group">
      
      <!-- Upper Display: Formula / Active Typing -->
      <div class="flex flex-col items-end w-full">
        <!-- Direction/Type description label -->
        <span id="conversionLabel" class="text-[10px] uppercase font-bold tracking-widest text-[var(--text-muted)] mb-1">Rial to Dirham</span>
        
        <div class="flex items-center justify-end w-full max-w-full overflow-hidden">
          <p id="displayInput" class="text-2xl font-light text-[var(--text-muted)] tracking-wide truncate max-w-full select-all">0</p>
          <span id="inputUnit" class="text-xs font-semibold text-[var(--text-muted)] ml-1 mr-1">Alf Ryal</span>
          <span class="w-[2px] h-6 bg-amber-500 dark:bg-amber-400 cursor-blink ml-0.5"></span>
        </div>
      </div>

      <!-- Lower Display: Conversion Result -->
      <div class="flex justify-between items-end w-full mt-4">
        
        <!-- Copy Button (tactile touch) -->
        <button onclick="copyResult()" id="copyBtn" class="neumorphic-btn p-2 rounded-xl text-[var(--text-muted)] hover:text-[var(--text-main)] active:scale-90 transition-all flex items-center justify-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
          <span id="copyText" class="text-[10px] font-bold uppercase tracking-wider">Copy</span>
        </button>

        <!-- Dynamic Output -->
        <div class="flex items-baseline justify-end overflow-hidden max-w-[70%]">
          <h2 id="resultText" class="text-4xl font-bold tracking-tight text-[var(--text-main)] truncate">0</h2>
          <span id="outputUnit" class="text-base font-semibold text-[var(--text-muted)] ml-1 mr-1">DH</span>
        </div>
      </div>
    </div>

    <!-- Interactive Actions: Swap & Save Row -->
    <div class="grid grid-cols-2 gap-4">
      <button onclick="swapConversion()" class="neumorphic-btn py-3 rounded-2xl flex items-center justify-center gap-1.5 font-bold text-[10px] sm:text-xs uppercase tracking-wider text-[var(--text-main)] hover:scale-[1.02] transition-transform duration-200">
        <svg class="w-5 h-5 text-[var(--text-muted)] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
        </svg>
        <span id="swapBtnText" class="truncate">Swap</span>
      </button>

      <button onclick="saveToHistory()" class="neumorphic-btn-accent py-3 rounded-2xl flex items-center justify-center gap-1.5 font-bold text-[10px] sm:text-xs uppercase tracking-wider hover:scale-[1.02] transition-transform duration-200">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
        <span id="saveBtnText" class="truncate">Save</span>
      </button>
    </div>

    <!-- Tactile Numpad Grid -->
    <div class="grid grid-cols-3 gap-4">
      <button onclick="typeChar('1')" class="neumorphic-btn w-full aspect-square rounded-full text-2xl font-normal text-[var(--text-main)] flex items-center justify-center">1</button>
      <button onclick="typeChar('2')" class="neumorphic-btn w-full aspect-square rounded-full text-2xl font-normal text-[var(--text-main)] flex items-center justify-center">2</button>
      <button onclick="typeChar('3')" class="neumorphic-btn w-full aspect-square rounded-full text-2xl font-normal text-[var(--text-main)] flex items-center justify-center">3</button>

      <button onclick="typeChar('4')" class="neumorphic-btn w-full aspect-square rounded-full text-2xl font-normal text-[var(--text-main)] flex items-center justify-center">4</button>
      <button onclick="typeChar('5')" class="neumorphic-btn w-full aspect-square rounded-full text-2xl font-normal text-[var(--text-main)] flex items-center justify-center">5</button>
      <button onclick="typeChar('6')" class="neumorphic-btn w-full aspect-square rounded-full text-2xl font-normal text-[var(--text-main)] flex items-center justify-center">6</button>

      <button onclick="typeChar('7')" class="neumorphic-btn w-full aspect-square rounded-full text-2xl font-normal text-[var(--text-main)] flex items-center justify-center">7</button>
      <button onclick="typeChar('8')" class="neumorphic-btn w-full aspect-square rounded-full text-2xl font-normal text-[var(--text-main)] flex items-center justify-center">8</button>
      <button onclick="typeChar('9')" class="neumorphic-btn w-full aspect-square rounded-full text-2xl font-normal text-[var(--text-main)] flex items-center justify-center">9</button>

      <button onclick="typeChar('C')" class="neumorphic-btn w-full aspect-square rounded-full text-2xl font-medium text-red-500 dark:text-red-400 flex items-center justify-center">C</button>
      <button onclick="typeChar('0')" class="neumorphic-btn w-full aspect-square rounded-full text-2xl font-normal text-[var(--text-main)] flex items-center justify-center">0</button>
      <button onclick="typeChar('DEL')" class="neumorphic-btn w-full aspect-square rounded-full text-xl font-normal text-[var(--text-main)] flex items-center justify-center">
        <svg class="w-6 h-6 text-[var(--text-muted)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z"></path></svg>
      </button>
    </div>

    <!-- History Panel -->
    <div class="mt-2 space-y-2">
      <div id="historyHeader" class="hidden flex justify-between items-center px-1 text-[10px] text-[var(--text-muted)] font-bold uppercase tracking-wider">
        <span id="historyTitleText">History</span>
        <button onclick="clearHistory()" id="clearBtnText" class="text-red-500 hover:text-red-400 transition-colors uppercase font-bold text-[10px]">Clear</button>
      </div>

      <div id="historyContainer" class="hidden max-h-[100px] overflow-y-auto pr-1 space-y-2">
        <!-- History items loaded dynamically -->
      </div>
    </div>

  </div>

  <script>
    const translations = {
      fr: {
        title: "Convertisseur",
        labelR2D: "Ryal vers Dirham",
        labelD2R: "Dirham vers Ryal",
        placeholder: "Entrez un montant",
        copy: "Copier",
        copied: "Copié!",
        save: "Sauvegarder",
        swap: "Inverser",
        langInd: "FR ➔ AR",
        unitRial: "Alf Ryal",
        unitDH: "DH",
        historyTitle: "Historique",
        clearBtn: "Effacer"
      },
      ar: {
        title: "محول العملة",
        labelR2D: "الريال إلى الدرهم",
        labelD2R: "الدرهم إلى الريال",
        placeholder: "أدخل المبلغ",
        copy: "نسخ",
        copied: "تم النسخ!",
        save: "حفظ",
        swap: "عكس التحويل",
        langInd: "AR ➔ FR",
        unitRial: "ألف ريال",
        unitDH: "درهم",
        historyTitle: "السجل",
        clearBtn: "مسح"
      }
    };

    let isRialToDh = true;
    let currentLang = 'fr';
    let inputValue = '';
    let sessionHistory = [];

    const displayInputEl = document.getElementById('displayInput');
    const resultEl = document.getElementById('resultText');
    const inputUnitEl = document.getElementById('inputUnit');
    const outputUnitEl = document.getElementById('outputUnit');
    const conversionLabelEl = document.getElementById('conversionLabel');
    const copyTextEl = document.getElementById('copyText');
    const historyContainer = document.getElementById('historyContainer');
    const historyHeader = document.getElementById('historyHeader');

    // Theme Management
    function initTheme() {
      const knob = document.getElementById('themeKnob');
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.remove('dark');
        knob.style.transform = 'translateX(0px)';
      } else {
        document.documentElement.classList.add('dark');
        knob.style.transform = 'translateX(32px)';
        localStorage.setItem('theme', 'dark');
      }
    }

    function toggleTheme() {
      triggerHaptic();
      const knob = document.getElementById('themeKnob');
      const isDark = document.documentElement.classList.contains('dark');
      
      if (isDark) {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
        knob.style.transform = 'translateX(0px)';
      } else {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
        knob.style.transform = 'translateX(32px)';
      }
    }

    function updateUI() {
      const t = translations[currentLang];
      document.body.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
      
      conversionLabelEl.innerText = isRialToDh ? t.labelR2D : t.labelD2R;
      inputUnitEl.innerText = isRialToDh ? t.unitRial : t.unitDH;
      outputUnitEl.innerText = isRialToDh ? t.unitDH : t.unitRial;
      
      document.getElementById('langIndicator').innerText = t.langInd;
      copyTextEl.innerText = t.copy;
      document.getElementById('saveBtnText').innerText = t.save;
      document.getElementById('swapBtnText').innerText = t.swap;
      document.getElementById('historyTitleText').innerText = t.historyTitle;
      document.getElementById('clearBtnText').innerText = t.clearBtn;
      
      convert();
    }

    function toggleLanguage() {
      triggerHaptic();
      currentLang = currentLang === 'fr' ? 'ar' : 'fr';
      updateUI();
    }

    function swapConversion() {
      triggerHaptic();
      isRialToDh = !isRialToDh;
      if (inputValue) {
        let num = parseFloat(inputValue);
        if (!isNaN(num)) {
          inputValue = isRialToDh ? (num / 50).toString() : (num * 50).toString();
          // Clean dynamic decimal formatting
          if (inputValue.includes('.')) {
            const parts = inputValue.split('.');
            if (parts[1].length > 4) {
              inputValue = parseFloat(inputValue).toFixed(2).toString();
            }
          }
        }
      }
      updateUI();
    }

    function typeChar(char) {
      triggerHaptic();
      if (char === 'C') {
        inputValue = '';
      } else if (char === 'DEL') {
        inputValue = inputValue.slice(0, -1);
      } else {
        if (char === '.' && inputValue.includes('.')) return;
        if (inputValue === '0' && char !== '.') inputValue = '';
        if (inputValue.length >= 12) return; // Prevent extreme inputs
        inputValue += char;
      }
      
      displayInputEl.innerText = inputValue || '0';
      convert();
    }

    function triggerHaptic() {
      if (window.navigator && window.navigator.vibrate) {
        window.navigator.vibrate(12);
      }
    }

    function adjustFontSize() {
      const resultLength = resultEl.innerText.length;
      if (resultLength > 12) {
        resultEl.style.fontSize = '1.5rem';
      } else if (resultLength > 8) {
        resultEl.style.fontSize = '2rem';
      } else {
        resultEl.style.fontSize = '2.25rem'; // Default 36px
      }
    }

    function convert() {
      const num = parseFloat(inputValue);
      const t = translations[currentLang];
      
      if (isNaN(num) || inputValue === '') {
        resultEl.innerText = '0';
        adjustFontSize();
        return;
      }

      let res = isRialToDh ? num * 50 : num / 50;
      res = res % 1 === 0 ? res : parseFloat(res.toFixed(2));
      
      // Beautifully format using local settings (always Western numerals)
      resultEl.innerText = res.toLocaleString('fr-FR');
      adjustFontSize();
    }

    function copyResult() {
      triggerHaptic();
      const textToCopy = `${resultEl.innerText} ${outputUnitEl.innerText}`;
      if (resultEl.innerText === '0') return;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(textToCopy).then(() => {
          showCopied();
        });
      } else {
        const textarea = document.createElement('textarea');
        textarea.value = textToCopy;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showCopied();
      }
    }

    function showCopied() {
      copyTextEl.innerText = translations[currentLang].copied;
      setTimeout(() => {
        copyTextEl.innerText = translations[currentLang].copy;
      }, 2000);
    }

    function saveToHistory() {
      triggerHaptic();
      if (!inputValue) return;
      
      const t = translations[currentLang];
      const fromUnit = isRialToDh ? t.unitRial : t.unitDH;
      const toUnit = isRialToDh ? t.unitDH : t.unitRial;
      const resultText = resultEl.innerText;
      
      const historyStr = `${inputValue} ${fromUnit} = ${resultText} ${toUnit}`;
      
      // Prevent duplicates in history
      if (sessionHistory.includes(historyStr)) return;

      sessionHistory.unshift(historyStr);
      renderHistory();
    }

    function renderHistory() {
      if (sessionHistory.length === 0) {
        historyContainer.classList.add('hidden');
        historyHeader.classList.add('hidden');
        return;
      }
      historyContainer.classList.remove('hidden');
      historyHeader.classList.remove('hidden');
      
      historyContainer.innerHTML = sessionHistory.map((item, index) => `
        <div class="neumorphic-screen rounded-2xl p-3 text-xs text-[var(--text-main)] flex justify-between items-center animate-slide-down">
          <span class="flex-1 text-center font-medium font-sans">${item}</span>
          <button onclick="deleteHistoryItem(${index})" class="text-[var(--text-muted)] hover:text-red-500 p-1.5 transition-colors duration-200">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
          </button>
        </div>
      `).join('');
    }

    function deleteHistoryItem(index) {
      triggerHaptic();
      sessionHistory.splice(index, 1);
      renderHistory();
    }

    function clearHistory() {
      triggerHaptic();
      sessionHistory = [];
      renderHistory();
    }

    // Capture global keyboard events for seamless desktop experience
    window.addEventListener('keydown', (e) => {
      const key = e.key;
      if (/[0-9]/.test(key)) {
        typeChar(key);
      } else if (key === '.') {
        typeChar('.');
      } else if (key === 'Backspace') {
        typeChar('DEL');
      } else if (key === 'Escape' || key.toLowerCase() === 'c') {
        typeChar('C');
      } else if (key === 'Enter') {
        saveToHistory();
      }
    });

    // Initialize Page
    initTheme();
